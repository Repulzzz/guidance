
<!DOCTYPE html>
<html>
<head>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;700&display=swap" rel="stylesheet">
<meta charset="UTF-8">
<title>Student Information Form</title>

<script src="font.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<script>
const { jsPDF } = window.jspdf;

// 🔗 GOOGLE SHEETS URL
const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbz7NzOjuyNtlOuPd8hDELhi_iD0YY0l3pvyu8kX7BDpRfaNXjn8Lg6mQd-8CRAerlDSDg/exec";

// =========================
// 🚀 MAIN SUBMIT FUNCTION
// =========================
function submitForm() {
  const data = {
    name: document.getElementById("name").value.trim(),
    katakana: document.getElementById("katakana").value.trim(),
    sex: document.getElementById("sex").value,
    nationality: getRadioValue("nationality"),
    phone: document.getElementById("phone").value.trim(),
    email: document.getElementById("email")?.value.trim() || "",
    school: document.getElementById("school").value.trim(),
    graduation: document.getElementById("graduation").value,
    japaneseLevel: getRadioValue("japaneseLevel"),
  };

  // Handle "Other" nationality
  const otherRadio = document.getElementById("nationality-other");
  if (otherRadio && otherRadio.checked) {
    const otherValue = document.getElementById("nationality-other-input").value.trim();
    if (!otherValue) {
      showError("Please specify nationality.");
      return;
    }
    data.nationality = otherValue;
  }

  // Validation
  for (let key in data) {
    if (key === "email") continue;
    if (!data[key]) {
      showError("Please fill all fields.");
      return;
    }
  }

  if (!/^[0-9\-]+$/.test(data.phone)) {
    showError("Phone must contain only numbers and hyphens.");
    return;
  }

  showError("");

  // Store name for thank you page
  localStorage.setItem("username", data.name);

  // 📊 SEND TO GOOGLE SHEETS (using form submission method to avoid CORB)
  sendToGoogleSheets(data);

  // 📄 GENERATE PDF
  generatePDF(data);

  // Redirect to thank you page
  setTimeout(() => {
    window.location.href = "thankyou.html";
  }, 800);
}

// =========================
// 📊 SEND TO GOOGLE SHEETS (CORB-SAFE METHOD)
// =========================
function sendToGoogleSheets(data) {
  // Create a hidden iframe to submit the form (avoids CORB issues)
  const iframe = document.createElement('iframe');
  iframe.name = 'hidden_iframe';
  iframe.style.display = 'none';
  document.body.appendChild(iframe);

  // Create a form
  const form = document.createElement('form');
  form.method = 'POST';
  form.action = SCRIPT_URL;
  form.target = 'hidden_iframe';

  // Add form fields
  for (let key in data) {
    const input = document.createElement('input');
    input.type = 'hidden';
    input.name = key;
    input.value = data[key];
    form.appendChild(input);
  }

  // Submit form
  document.body.appendChild(form);
  form.submit();

  // Clean up
  setTimeout(() => {
    document.body.removeChild(form);
    document.body.removeChild(iframe);
  }, 1000);

  console.log("✅ Data sent to Google Sheets");
}

// =========================
// 📄 PDF GENERATION
// =========================
function generatePDF(data) {
  const doc = new jsPDF();

  try {
    doc.addFileToVFS("NotoSansJP-Regular.ttf", notoSansJPBase64);
    doc.addFont("NotoSansJP-Regular.ttf", "NotoSansJP", "normal");
    doc.setFont("NotoSansJP", "normal");
  } catch (e) {
    console.log("Font failed, using default");
  }

  doc.setFillColor(30, 60, 120);
  doc.rect(0, 0, 210, 25, "F");

  doc.setTextColor(255, 255, 255);
  doc.setFontSize(18);
  doc.text("Thank you for Filling", 105, 15, { align: "center" });

  doc.setTextColor(0);

  let y = 35;

  function addField(label, value) {
    if (!value) return;

    doc.setFontSize(12);
    doc.setTextColor(30, 60, 120);
    doc.text(label, 15, y);

    doc.setTextColor(0);
    const lines = doc.splitTextToSize(value, 110);
    doc.text(lines, 80, y);

    doc.line(15, y + 8, 200, y + 8);

    y += lines.length * 6 + 12;
  }

  addField("Name / 氏名", data.name);
  addField("Katakana / カタカナ", data.katakana);
  addField("Sex / 性別", data.sex);
  addField("Nationality / 国籍", data.nationality);
  addField("Phone / 電話番号", data.phone);
  addField("Email / メール", data.email);
  addField("School / 学校", data.school);
  addField("Graduation / 卒業予定", data.graduation);
  addField("Japanese Level / 日本語レベル", data.japaneseLevel);

  const today = new Date().toLocaleDateString();
  doc.setFontSize(9);
  doc.text("Date: " + today, 150, 285);

  doc.save("student_resume.pdf");
}

// =========================
// 🔧 HELPERS
// =========================
function getRadioValue(name) {
  const radios = document.getElementsByName(name);
  for (let r of radios) {
    if (r.checked) return r.value;
  }
  return "";
}

function showError(msg) {
  document.getElementById("error").innerText = msg;
}

function handleNationalityOther() {
  const otherRadio = document.getElementById("nationality-other");
  const otherInput = document.getElementById("nationality-other-input");

  if (otherRadio.checked) {
    otherInput.disabled = false;
    otherInput.focus();
  } else {
    otherInput.disabled = true;
    otherInput.value = "";
  }
}

function updateOtherValue() {
  const val = document.getElementById("nationality-other-input").value;
  document.getElementById("nationality-other").value = val;
}
</script>

<style>
body {
  font-family: Arial, sans-serif;
  background: #f5f5f5;
  padding: 20px;
}

.container {
  max-width: 600px;
  margin: auto;
  background: white;
  padding: 20px;
  border-radius: 10px;
  box-shadow: 0 0 10px rgba(0,0,0,0.1);
}

h2 {
  text-align: center;
}

label {
  font-weight: bold;
  margin-top: 10px;
  display: block;
}

input[type="text"], select {
  width: 100%;
  padding: 10px;
  margin-top: 5px;
  border-radius: 5px;
  border: 1px solid #ccc;
  box-sizing: border-box;
}

.radio-group {
  margin-top: 10px;
  margin-bottom: 10px;
}

.radio-option {
  display: block;
  margin: 8px 0;
  padding: 8px;
  background: #f9f9f9;
  border-radius: 5px;
}

.radio-option:hover {
  background: #f0f0f0;
}

.radio-option input[type="radio"] {
  margin-right: 8px;
  cursor: pointer;
}

.radio-option label {
  display: inline;
  font-weight: normal;
  cursor: pointer;
  margin: 0;
}

.other-input {
  display: inline-block;
  margin-left: 8px;
  padding: 5px;
  border: 1px solid #ccc;
  border-radius: 3px;
  width: 200px;
}

button {
  margin-top: 20px;
  width: 100%;
  padding: 12px;
  background: #000;
  color: white;
  border: none;
  border-radius: 5px;
  font-size: 16px;
  cursor: pointer;
}

button:hover {
  background: #333;
}

.error {
  color: red;
  font-size: 12px;
  margin-top: 10px;
}

.field-label {
  margin-top: 15px;
  margin-bottom: 5px;
}
</style>
</head>

<body>

<div class="container">
<h2>Student Information</h2>

<label class="field-label">氏名 / Full Name *</label>
<input type="text" id="name" placeholder="例: Magar Ram">

<label class="field-label">カタカナ / Katakana *</label>
<input type="text" id="katakana" placeholder="例: マガル　ラム">

<label class="field-label">性別 / Sex *</label>
<select id="sex">
  <option value="">Select</option>
  <option>Male</option>
  <option>Female</option>
</select>

<label class="field-label">国籍（地域） / Nationality (Region) *</label>
<div class="radio-group">
  <div class="radio-option">
    <input type="radio" name="nationality" id="nationality-nepal" value="Nepal" onchange="handleNationalityOther()">
    <label for="nationality-nepal">Nepal</label>
  </div>
  <div class="radio-option">
    <input type="radio" name="nationality" id="nationality-srilanka" value="Sri Lanka" onchange="handleNationalityOther()">
    <label for="nationality-srilanka">Sri Lanka</label>
  </div>
  <div class="radio-option">
    <input type="radio" name="nationality" id="nationality-bangladesh" value="Bangladesh" onchange="handleNationalityOther()">
    <label for="nationality-bangladesh">Bangladesh</label>
  </div>
  <div class="radio-option">
    <input type="radio" name="nationality" id="nationality-vietnam" value="Vietnam" onchange="handleNationalityOther()">
    <label for="nationality-vietnam">Vietnam</label>
  </div>
  <div class="radio-option">
    <input type="radio" name="nationality" id="nationality-myanmar" value="Myanmar" onchange="handleNationalityOther()">
    <label for="nationality-myanmar">Myanmar</label>
  </div>
  <div class="radio-option">
    <input type="radio" name="nationality" id="nationality-uzbekistan" value="Uzbekistan" onchange="handleNationalityOther()">
    <label for="nationality-uzbekistan">Uzbekistan</label>
  </div>
  <div class="radio-option">
    <input type="radio" name="nationality" id="nationality-pakistan" value="Pakistan" onchange="handleNationalityOther()">
    <label for="nationality-pakistan">Pakistan</label>
  </div>
  <div class="radio-option">
    <input type="radio" name="nationality" id="nationality-other" value="" onchange="handleNationalityOther()">
    <label for="nationality-other">Others:</label>
    <input type="text" class="other-input" id="nationality-other-input" placeholder="Please specify" disabled onchange="updateOtherValue()">
  </div>
</div>

<label class="field-label">電話番号 / Phone *</label>
<input type="text" id="phone" placeholder="例: 090-XXXX-XXXX">

<label class="field-label">Email *</label>
<input type="text" id="email" placeholder="例: xxxx@yyy.com">

<label class="field-label">日本の在籍学校 / Current School *</label>
<input list="schools" type="text" id="school" placeholder="Type school name">
<datalist id="schools">
  <option>Human Academy Japanese Language School Osaka Campus (ヒューマンアカデミー日本語学校大阪校)</option>
<option>ISI Language School Osaka (ISIランゲージスクール大阪校)</option>
<option>Kyoto Institute of Language and Culture (京都言語文化学院)</option>
<option>ISI Language School Kyoto (ISIランゲージスクール京都校)</option>
<option>Kyoto Computer Gakuin Kamogawa Campus Kyoto Japanese Training Center (京都コンピュータ学院鴨川校京都日本語研修センター)</option>
<option>Ashiya International Academy Osaka Campus (芦屋国際学院 大阪校)</option>
<option>Kyoto Asuka Academia (京都あすかアカデミア)</option>
<option>Osaka Christian Junior College Japanese Course (大阪キリスト教短期大学 日本語別科)</option>
</datalist>

<label class="field-label">卒業予定年月（例：2027/3） / Expected Graduation Date (Example: 2027/3) *</label>
<select id="graduation">
  <option value="">Select</option>
  <option value="2026/9">(2026年9月) September, 2026</option>
  <option value="2027/3">(2027年3月) March, 2027</option>
  <option value="2027/9">(2027年9月) September, 2027</option>
  <option value="2028/3">(2028年3月) March, 2028</option>
</select>

<label class="field-label">現在の日本語レベル / Current Japanese Proficiency Level *</label>
<div class="radio-group">
  <div class="radio-option">
    <input type="radio" name="japaneseLevel" id="jlpt-n1" value="日本語能力試験（JLPT）N1相当 / Equivalent to the JLPT N1">
    <label for="jlpt-n1">日本語能力試験（JLPT）N1相当 / Equivalent to the JLPT N1</label>
  </div>
  <div class="radio-option">
    <input type="radio" name="japaneseLevel" id="jlpt-n2" value="日本語能力試験（JLPT）N2相当 / Equivalent to the JLPT N2">
    <label for="jlpt-n2">日本語能力試験（JLPT）N2相当 / Equivalent to the JLPT N2</label>
  </div>
  <div class="radio-option">
    <input type="radio" name="japaneseLevel" id="jlpt-n3" value="日本語能力試験（JLPT）N3相当 / Equivalent to the JLPT N3">
    <label for="jlpt-n3">日本語能力試験（JLPT）N3相当 / Equivalent to the JLPT N3</label>
  </div>
  <div class="radio-option">
    <input type="radio" name="japaneseLevel" id="jlpt-n4" value="日本語能力試験（JLPT）N4相当 / Equivalent to the JLPT N4">
    <label for="jlpt-n4">日本語能力試験（JLPT）N4相当 / Equivalent to the JLPT N4</label>
  </div>
  <div class="radio-option">
    <input type="radio" name="japaneseLevel" id="jlpt-n5" value="日本語能力試験（JLPT）N5相当 / Equivalent to the JLPT N5">
    <label for="jlpt-n5">日本語能力試験（JLPT）N5相当 / Equivalent to the JLPT N5</label>
  </div>
</div>

<div id="error" class="error"></div>

<button onclick="submitForm()">Submit & Download PDF</button>
</div>

</body>
</html>
