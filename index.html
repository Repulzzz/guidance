<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Student Information Form</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="font.js"></script>

<script>
const { jsPDF } = window.jspdf;

// =========================
// 🚀 SUBMIT FUNCTION
// =========================
function submitForm() {

  const data = {
    name: document.getElementById("name").value.trim(),
    katakana: document.getElementById("katakana").value.trim(),
    sex: document.getElementById("sex").value,
    nationality: getRadioValue("nationality"),
    phone: document.getElementById("phone").value.trim(),
    email: document.getElementById("email").value.trim(),
    school: document.getElementById("school").value.trim(),
    graduation: document.getElementById("graduation").value,
    japaneseLevel: getRadioValue("japaneseLevel"),
  };

  // ✅ VALIDATION
  for (let key in data) {
    if (!data[key]) {
      showError("Please fill all fields.");
      return;
    }
  }

  if (!/^[0-9\- ]+$/.test(data.phone)) {
    showError("Phone must contain only numbers.");
    return;
  }

  showError("");

  // ✅ SEND TO GOOGLE SHEET
  fetch("https://script.google.com/macros/s/AKfycbz7NzOjuyNtlOuPd8hDELhi_iD0YY0l3pvyu8kX7BDpRfaNXjn8Lg6mQd-8CRAerlDSDg/exec", {
    method: "POST",
    headers: {
      "Content-Type": "application/json"
    },
    body: JSON.stringify(data)
  })
  .then(res => res.text()) // safer than json()
  .then(() => {
    generatePDF(data);
    alert("Submitted successfully!");

    document.getElementById("myForm").reset();

    setTimeout(() => {
      window.location.href = "thankyou.html";
    }, 500);
  })
  .catch(err => {
    showError("Submission failed.");
    console.log(err);
  });
}

// =========================
// 📄 PDF GENERATION
// =========================
function generatePDF(data) {

  const doc = new jsPDF();

  // FONT
  try {
    doc.addFileToVFS("NotoSansJP-Regular.ttf", notoSansJPBase64);
    doc.addFont("NotoSansJP-Regular.ttf", "NotoSansJP", "normal");
    doc.setFont("NotoSansJP", "normal");
  } catch (e) {}

  // HEADER
  doc.setFillColor(30, 60, 120);
  doc.rect(0, 0, 210, 25, "F");

  doc.setTextColor(255, 255, 255);
  doc.setFontSize(18);
  doc.text("Student Information", 105, 15, { align: "center" });

  doc.setTextColor(0, 0, 0);

  let y = 35;

  function addField(label, value) {
    if (!value) return;

    doc.setFontSize(12);
    doc.setTextColor(30, 60, 120);
    doc.text(label, 15, y);

    doc.setTextColor(0);
    const lines = doc.splitTextToSize(value, 120);
    doc.text(lines, 70, y);

    // 🔥 thicker + wider line
    doc.setDrawColor(200);
    doc.setLineWidth(0.8);
    doc.line(10, y + 8, 205, y + 8);

    y += lines.length * 6 + 12;
  }

  addField("Name / 氏名", data.name);
  addField("Katakana / カタカナ", data.katakana);
  addField("Sex / 性別", data.sex);
  addField("Nationality / 国籍", data.nationality);
  addField("Phone / 電話番号", data.phone);
  addField("Email / メール", data.email);
  addField("School / 学校", data.school);
  addField("Graduation / 卒業予定", data.graduation);
  addField("Japanese Level / 日本語", data.japaneseLevel);

  const today = new Date().toLocaleDateString();

  doc.setFontSize(9);
  doc.setTextColor(120);
  doc.text("Date: " + today, 150, 285);

  doc.line(10, 280, 200, 280);

  doc.save("student_info.pdf");
}

// =========================
// 🔧 HELPERS
// =========================
function getRadioValue(name) {
  const radios = document.getElementsByName(name);
  for (let r of radios) {
    if (r.checked) return r.value;
  }
  return "";
}

function showError(msg) {
  document.getElementById("error").innerText = msg;
}

// =========================
// 🌏 OTHER NATIONALITY
// =========================
function handleNationalityOther() {
  const otherRadio = document.getElementById("nationality-other");
  const otherInput = document.getElementById("nationality-other-input");

  if (otherRadio.checked) {
    otherInput.disabled = false;
  } else {
    otherInput.disabled = true;
    otherInput.value = "";
  }
}

function updateOtherValue() {
  const otherRadio = document.getElementById("nationality-other");
  const otherInput = document.getElementById("nationality-other-input");

  if (otherRadio.checked) {
    otherRadio.value = otherInput.value;
  }
}
</script>

<style>
body {
  font-family: Arial;
  background: #f5f5f5;
  padding: 20px;
}

.container {
  max-width: 600px;
  margin: auto;
  background: white;
  padding: 20px;
  border-radius: 10px;
}

input, select {
  width: 100%;
  padding: 10px;
  margin-top: 5px;
}

button {
  margin-top: 20px;
  width: 100%;
  padding: 12px;
  background: black;
  color: white;
}

.error {
  color: red;
}
</style>
</head>

<body>

<div class="container">
<h2>Student Information</h2>

<form id="myForm" onsubmit="event.preventDefault(); submitForm();">

<label>Name</label>
<input type="text" id="name">

<label>Katakana</label>
<input type="text" id="katakana">

<label>Sex</label>
<select id="sex">
<option value="">Select</option>
<option>Male</option>
<option>Female</option>
</select>

<label>Nationality</label>

<input type="radio" name="nationality" value="Nepal"> Nepal<br>
<input type="radio" name="nationality" value="Sri Lanka"> Sri Lanka<br>
<input type="radio" name="nationality" value="Other" id="nationality-other" onchange="handleNationalityOther()"> Other
<input type="text" id="nationality-other-input" disabled onchange="updateOtherValue()">

<label>Phone</label>
<input type="text" id="phone">

<label>Email</label>
<input type="text" id="email">

<label>School</label>
<input type="text" id="school">

<label>Graduation</label>
<select id="graduation">
<option value="">Select</option>
<option>2026/9</option>
<option>2027/3</option>
</select>

<label>Japanese Level</label>
<input type="radio" name="japaneseLevel" value="N1"> N1
<input type="radio" name="japaneseLevel" value="N2"> N2

<div id="error" class="error"></div>

<button type="submit">Submit & Download PDF</button>

</form>
</div>

</body>
</html>
