<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>学生情報登録フォーム</title>
  <script src="font.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      font-family: Arial, sans-serif;
      padding: 20px;
    }
    .container {
      max-width: 700px;
      margin: 0 auto;
      background: white;
      border-radius: 20px;
      padding: 30px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.3);
    }
    h1 { text-align: center; margin-bottom: 20px; color: #333; }
    .form-group { margin-bottom: 15px; }
    label { display: block; font-weight: bold; margin-bottom: 5px; color: #555; }
    .required { color: red; }
    input, select {
      width: 100%;
      padding: 10px;
      border: 1px solid #ddd;
      border-radius: 8px;
      font-size: 14px;
    }
    .radio-group { background: #f5f5f5; padding: 10px; border-radius: 8px; }
    .radio-option { margin: 8px 0; display: flex; align-items: center; }
    .radio-option input { width: auto; margin-right: 10px; }
    .radio-option label { margin: 0; font-weight: normal; }
    .other-input { margin-left: 10px; flex: 1; }
    button {
      width: 100%;
      padding: 12px;
      background: #4CAF50;
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 16px;
      cursor: pointer;
      margin-top: 20px;
    }
    button:hover { background: #45a049; }
    button:disabled { opacity: 0.6; cursor: not-allowed; }
    .notification {
      position: fixed;
      top: 20px;
      right: 20px;
      padding: 15px 20px;
      border-radius: 10px;
      color: white;
      font-weight: bold;
      z-index: 1000;
      animation: slideIn 0.3s ease;
    }
    @keyframes slideIn {
      from { transform: translateX(100%); opacity: 0; }
      to { transform: translateX(0); opacity: 1; }
    }
    .notification.success { background: #4CAF50; }
    .notification.error { background: #f44336; }
    .notification.info { background: #2196F3; }
  </style>
</head>
<body>
<div class="container">
  <h1>📝 学生情報登録フォーム</h1>
  
  <form id="studentForm">
    <div class="form-group">
      <label>氏名 / Full Name <span class="required">*</span></label>
      <input type="text" id="name" placeholder="例: Milan Rai">
    </div>

    <div class="form-group">
      <label>カタカナ / Katakana <span class="required">*</span></label>
      <input type="text" id="katakana" placeholder="例: ミラン ライ">
    </div>

    <div class="form-group">
      <label>性別 / Sex <span class="required">*</span></label>
      <select id="sex">
        <option value="">選択してください</option>
        <option value="Male">男性 / Male</option>
        <option value="Female">女性 / Female</option>
      </select>
    </div>

    <div class="form-group">
      <label>国籍 / Nationality <span class="required">*</span></label>
      <div class="radio-group">
        <div class="radio-option"><input type="radio" name="nationality" value="Nepal"> <label>🇳🇵 Nepal</label></div>
        <div class="radio-option"><input type="radio" name="nationality" value="Sri Lanka"> <label>🇱🇰 Sri Lanka</label></div>
        <div class="radio-option"><input type="radio" name="nationality" value="Bangladesh"> <label>🇧🇩 Bangladesh</label></div>
        <div class="radio-option"><input type="radio" name="nationality" value="Vietnam"> <label>🇻🇳 Vietnam</label></div>
        <div class="radio-option"><input type="radio" name="nationality" value="Myanmar"> <label>🇲🇲 Myanmar</label></div>
        <div class="radio-option"><input type="radio" name="nationality" value="Uzbekistan"> <label>🇺🇿 Uzbekistan</label></div>
        <div class="radio-option"><input type="radio" name="nationality" value="Pakistan"> <label>🇵🇰 Pakistan</label></div>
        <div class="radio-option"><input type="radio" name="nationality" value="" id="natOther"> <label>🌏 Other:</label> <input type="text" id="otherNationality" class="other-input" placeholder="Enter country" disabled></div>
      </div>
    </div>

    <div class="form-group">
      <label>電話番号 / Phone <span class="required">*</span></label>
      <input type="tel" id="phone" placeholder="090-1234-5678">
    </div>

    <div class="form-group">
      <label>Email <span class="required">*</span></label>
      <input type="email" id="email" placeholder="milan@example.com">
    </div>

    <div class="form-group">
      <label>在籍学校 / Current School <span class="required">*</span></label>
      <input list="schools" id="school" placeholder="学校名を入力">
      <datalist id="schools">
        <option>Human Academy Japanese Language School Osaka Campus</option>
        <option>ISI Language School Osaka</option>
        <option>Kyoto Institute of Language and Culture</option>
        <option>Ashiya International Academy Osaka Campus</option>
      </datalist>
    </div>

    <div class="form-group">
      <label>卒業予定 / Expected Graduation <span class="required">*</span></label>
      <select id="graduation">
        <option value="">選択してください</option>
        <option value="2026/9">2026年9月 / September 2026</option>
        <option value="2027/3">2027年3月 / March 2027</option>
        <option value="2027/9">2027年9月 / September 2027</option>
        <option value="2028/3">2028年3月 / March 2028</option>
      </select>
    </div>

    <div class="form-group">
      <label>日本語レベル / Japanese Level <span class="required">*</span></label>
      <div class="radio-group">
        <div class="radio-option"><input type="radio" name="jpLevel" value="JLPT N1"> <label>JLPT N1 相当</label></div>
        <div class="radio-option"><input type="radio" name="jpLevel" value="JLPT N2"> <label>JLPT N2 相当</label></div>
        <div class="radio-option"><input type="radio" name="jpLevel" value="JLPT N3"> <label>JLPT N3 相当</label></div>
        <div class="radio-option"><input type="radio" name="jpLevel" value="JLPT N4"> <label>JLPT N4 相当</label></div>
        <div class="radio-option"><input type="radio" name="jpLevel" value="JLPT N5"> <label>JLPT N5 相当</label></div>
      </div>
    </div>

    <button type="button" id="submitBtn">✅ 送信してPDFをダウンロード</button>
  </form>
</div>

<script>

const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbz7NzOjuyNtlOuPd8hDELhi_iD0YY0l3pvyu8kX7BDpRfaNXjn8Lg6mQd-8CRAerlDSDg/exec";

function showNotification(message, type) {
  const notification = document.createElement('div');
  notification.className = `notification ${type}`;
  notification.textContent = message;
  document.body.appendChild(notification);
  setTimeout(() => notification.remove(), 3000);
}

// Handle other nationality
const otherRadio = document.getElementById('natOther');
const otherInput = document.getElementById('otherNationality');

function handleOther() {
  otherInput.disabled = !otherRadio.checked;
  if (!otherRadio.checked) otherInput.value = '';
}
otherRadio?.addEventListener('change', handleOther);
document.querySelectorAll('input[name="nationality"]').forEach(r => r.addEventListener('change', handleOther));

function getNationality() {
  const selected = document.querySelector('input[name="nationality"]:checked');
  if (!selected) return '';
  return selected.value === '' ? otherInput.value : selected.value;
}

function getJapaneseLevel() {
  const selected = document.querySelector('input[name="jpLevel"]:checked');
  return selected ? selected.value : '';
}

function validate() {
  const name = document.getElementById('name').value.trim();
  const katakana = document.getElementById('katakana').value.trim();
  const sex = document.getElementById('sex').value;
  const nationality = getNationality();
  const phone = document.getElementById('phone').value.trim();
  const email = document.getElementById('email').value.trim();
  const school = document.getElementById('school').value.trim();
  const graduation = document.getElementById('graduation').value;
  const jpLevel = getJapaneseLevel();
  
  if (!name) { showNotification('氏名を入力してください', 'error'); return false; }
  if (!katakana) { showNotification('カタカナを入力してください', 'error'); return false; }
  if (!sex) { showNotification('性別を選択してください', 'error'); return false; }
  if (!nationality) { showNotification('国籍を選択してください', 'error'); return false; }
  if (!phone) { showNotification('電話番号を入力してください', 'error'); return false; }
  if (!email || !email.includes('@')) { showNotification('有効なメールアドレスを入力してください', 'error'); return false; }
  if (!school) { showNotification('学校名を入力してください', 'error'); return false; }
  if (!graduation) { showNotification('卒業予定を選択してください', 'error'); return false; }
  if (!jpLevel) { showNotification('日本語レベルを選択してください', 'error'); return false; }
  
  return { name, katakana, sex, nationality, phone, email, school, graduation, japaneseLevel: jpLevel };
}

function generatePDF(data) {
  const { jsPDF } = window.jspdf;
  const doc = new jsPDF();
  
  doc.setFillColor(30, 60, 120);
  doc.rect(0, 0, 210, 30, 'F');
  doc.setTextColor(255, 255, 255);
  doc.setFontSize(18);
  doc.text('Student Registration', 105, 20, { align: 'center' });
  
  doc.setTextColor(0, 0, 0);
  let y = 45;
  
  const fields = [
    ['Name:', data.name],
    ['Katakana:', data.katakana],
    ['Sex:', data.sex],
    ['Nationality:', data.nationality],
    ['Phone:', data.phone],
    ['Email:', data.email],
    ['School:', data.school],
    ['Graduation:', data.graduation],
    ['Japanese Level:', data.japaneseLevel]
  ];
  
  doc.setFontSize(11);
  fields.forEach(field => {
    if (field[1]) {
      doc.text(field[0], 20, y);
      doc.text(field[1], 70, y);
      y += 10;
      doc.line(20, y - 3, 190, y - 3);
    }
  });
  
  const date = new Date().toLocaleDateString();
  doc.setFontSize(9);
  doc.setTextColor(128, 128, 128);
  doc.text(`Generated: ${date}`, 150, 280);
  
  doc.save(`student_${data.name.replace(/\s/g, '_')}.pdf`);
}

async function sendToSheet(data) {
  // Create form data with correct field names matching your sheet columns
  const formData = new URLSearchParams();
  formData.append('name', data.name);
  formData.append('katakana', data.katakana);
  formData.append('sex', data.sex);
  formData.append('nationality', data.nationality);
  formData.append('phone', data.phone);
  formData.append('email', data.email);
  formData.append('school', data.school);
  formData.append('graduation', data.graduation);
  formData.append('japaneseLevel', data.japaneseLevel);
  
  console.log("Sending data:", {
    name: data.name,
    email: data.email,
    school: data.school,
    japaneseLevel: data.japaneseLevel
  });
  
  try {
    await fetch(SCRIPT_URL, {
      method: 'POST',
      mode: 'no-cors',
      headers: {
        'Content-Type': 'application/x-www-form-urlencoded',
      },
      body: formData.toString()
    });
    console.log("✅ Data sent successfully");
    return true;
  } catch(err) {
    console.error("Error sending data:", err);
    return false;
  }
}

document.getElementById('submitBtn').addEventListener('click', async function() {
  const data = validate();
  if (!data) return;
  
  const btn = this;
  const originalText = btn.textContent;
  btn.textContent = '⏳ 送信中...';
  btn.disabled = true;
  
  // Generate PDF
  generatePDF(data);
  
  // Send to Google Sheets
  await sendToSheet(data);
  
  showNotification('✅ 送信完了！データを保存しました', 'success');
  
  btn.textContent = '✅ 送信完了';
  setTimeout(() => {
    btn.textContent = originalText;
    btn.disabled = false;
  }, 2000);
  
  // Optional: Clear form
  // document.getElementById('studentForm').reset();
});
</script>
</body>
</html>
