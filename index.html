<script>
const { jsPDF } = window.jspdf;

const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbz7NzOjuyNtlOuPd8hDELhi_iD0YY0l3pvyu8kX7BDpRfaNXjn8Lg6mQd-8CRAerlDSDg/exec";

// =========================
// 🚀 MAIN SUBMIT FUNCTION
// =========================
function submitForm() {

  const data = {
    name: document.getElementById("name").value.trim(),
    katakana: document.getElementById("katakana").value.trim(),
    sex: document.getElementById("sex").value,
    nationality: getRadioValue("nationality"),
    phone: document.getElementById("phone").value.trim(),
    email: document.getElementById("email").value.trim(),
    school: document.getElementById("school").value.trim(),
    graduation: document.getElementById("graduation").value,
    japaneseLevel: getRadioValue("japaneseLevel"),
  };

  // ✅ OTHER nationality fix
  const otherRadio = document.getElementById("nationality-other");
  if (otherRadio.checked) {
    const otherValue = document.getElementById("nationality-other-input").value.trim();
    if (!otherValue) {
      showError("Please specify nationality.");
      return;
    }
    data.nationality = otherValue;
  }

  // ✅ validation
  for (let key in data) {
    if (!data[key]) {
      showError("Please fill all fields.");
      return;
    }
  }

  if (!/^[0-9]+$/.test(data.phone)) {
    showError("Phone must be numbers only.");
    return;
  }

  showError("");

  // ✅ save name
  localStorage.setItem("username", data.name);

  // ✅ generate PDF
  generatePDF(data);

  // ✅ send to sheets THEN redirect
  sendToGoogleSheets(data);
}

// =========================
// 📊 SEND TO GOOGLE SHEETS
// =========================
function sendToGoogleSheets(data) {

  fetch(SCRIPT_URL, {
    method: "POST",
    body: JSON.stringify(data),   // IMPORTANT
    // ❌ NO application/json header
  })
  .then(res => res.text())
  .then(res => {
    console.log("✅ Sent:", res);

    // ✅ redirect AFTER success
    window.location.href = "thankyou.html";
  })
  .catch(err => {
    console.error("❌ Error:", err);
    showError("Failed to send data.");
  });
}

// =========================
// 📄 PDF GENERATION (same)
// =========================
function generatePDF(data) {
  const doc = new jsPDF();
  doc.text("Student Info", 10, 10);
  doc.text("Name: " + data.name, 10, 20);
  doc.save("student.pdf");
}

// =========================
// 🔧 HELPERS
// =========================
function getRadioValue(name) {
  const radios = document.getElementsByName(name);
  for (let r of radios) {
    if (r.checked) return r.value;
  }
  return "";
}

function showError(msg) {
  document.getElementById("error").innerText = msg;
}
</script>
