<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Student Information Form</title>
<script src="main.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>

<script>
function submitForm() {
  const data = {
    name: document.getElementById("name").value.trim(),
    katakana: document.getElementById("katakana").value.trim(),
    sex: document.getElementById("sex").value,
    nationality: getRadioValue("nationality"),
    phone: document.getElementById("phone").value.trim(),
    email: document.getElementById("email")?.value.trim() || "",
    school: document.getElementById("school").value.trim(),
    graduation: document.getElementById("graduation").value,
    japaneseLevel: getRadioValue("japaneseLevel"),
    key: "kcg123"
  };

  // ✅ Validation
  for (let key in data) {
    if (key === "email" || key === "key") continue;
    if (!data[key]) {
      showError("Please fill all fields.");
      return;
    }
  }

  if (!/^[0-9\-]+$/.test(data.phone)) {
    showError("Phone must contain only numbers and hyphens.");
    return;
  }

  if (data.email && !/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(data.email)) {
    showError("Invalid email format.");
    return;
  }

  showError("");

  fetch("https://script.google.com/macros/s/AKfycbz7NzOjuyNtlOuPd8hDELhi_iD0YY0l3pvyu8kX7BDpRfaNXjn8Lg6mQd-8CRAerlDSDg/exec", {
    method: "POST",
    body: JSON.stringify(data)
  })
  .then(res => res.json())
  .then(() => {
    // ✅ AFTER SUCCESS → generate PDF
    generatePDF(data);
    alert("Submitted successfully!");
    document.getElementById("studentForm")?.reset();
  })
  .catch(err => {
    showError("Submission failed. Please try again.");
    console.log(err);
  });
}

// 📄 PDF GENERATION using html2canvas
function generatePDF(data) {
  const element = document.createElement("div");
  element.style.padding = "30px";
  element.style.fontFamily = "Arial";
  element.style.width = "800px";
  element.style.background = "white";

  element.innerHTML = `
    <h2 style="text-align:center; border-bottom:2px solid black; padding-bottom:10px;">
      Student Information Form
    </h2>

    <table style="width:100%; border-collapse:collapse; margin-top:20px;">
      ${row("氏名 / Name", data.name)}
      ${row("カタカナ / Katakana", data.katakana)}
      ${row("性別 / Sex", data.sex)}
      ${row("国籍 / Nationality", data.nationality)}
      ${row("電話番号 / Phone", data.phone)}
      ${row("Email", data.email)}
      ${row("学校 / School", data.school)}
      ${row("卒業予定 / Graduation", data.graduation)}
      ${row("日本語レベル / Japanese Level", data.japaneseLevel)}
    </table>

    <p style="margin-top:30px; text-align:right;">
      Date: ${new Date().toLocaleDateString()}
    </p>
  `;

  document.body.appendChild(element);

  html2canvas(element, { scale: 2 }).then(canvas => {
    const imgData = canvas.toDataURL("image/png");
    const { jsPDF } = window.jspdf;
    const doc = new jsPDF("p", "mm", "a4");

    const imgWidth = 210;
    const imgHeight = canvas.height * imgWidth / canvas.width;

    doc.addImage(imgData, "PNG", 0, 0, imgWidth, imgHeight);
    doc.save(`student_${data.name.replace(/\s/g, '_')}.pdf`);

    document.body.removeChild(element);
  });
}

// Helper for table rows
function row(label, value) {
  return `
    <tr>
      <td style="border:1px solid black; padding:10px; width:35%;">
        <b>${label}</b>
      </td>
      <td style="border:1px solid black; padding:10px;">
        ${value || ""}
      </td>
    </tr>
  `;
}

// 🔧 Helpers
function getRadioValue(name) {
  const radios = document.getElementsByName(name);
  for (let radio of radios) {
    if (radio.checked) return radio.value;
  }
  return "";
}

function showError(msg) {
  document.getElementById("error").innerText = msg;
}

// Nationality "Other" handling
function handleNationalityOther() {
  const otherRadio = document.getElementById("nationality-other");
  const otherInput = document.getElementById("nationality-other-input");

  if (otherRadio.checked) {
    otherInput.disabled = false;
    otherInput.focus();
  } else {
    otherInput.disabled = true;
    otherInput.value = "";
  }
}

function updateOtherValue() {
  const otherRadio = document.getElementById("nationality-other");
  const otherInput = document.getElementById("nationality-other-input");

  if (otherInput.value.trim()) {
    otherRadio.value = otherInput.value.trim();
  } else {
    otherRadio.value = "";
  }
}
  const schools = [
  "Human Academy Japanese Language School Osaka Campus",
  "ISI Language School Osaka",
  "Kyoto Institute of Language and Culture",
  "ISI Language School Kyoto",
  "Kyoto Computer Gakuin Kamogawa Campus Kyoto Japanese Training Center",
  "Kyoto Minsai Japanese Language School",
  "Keishin Language Academy Kyoto Chuo Campus"
  // 👉 add your full list here
];

const input = document.getElementById("school");
const suggestionBox = document.getElementById("suggestions");

input.addEventListener("input", function () {
  const value = this.value.toLowerCase();
  suggestionBox.innerHTML = "";

  if (!value) {
    suggestionBox.style.display = "none";
    return;
  }

  const filtered = schools.filter(s => s.toLowerCase().includes(value));

  filtered.slice(0, 8).forEach(item => {
    const div = document.createElement("div");
    div.classList.add("suggestion-item");
    div.textContent = item;

    div.onclick = () => {
      input.value = item;
      suggestionBox.innerHTML = "";
      suggestionBox.style.display = "none";
    };

    suggestionBox.appendChild(div);
  });

  suggestionBox.style.display = "block";
});

document.addEventListener("click", (e) => {
  if (!e.target.closest("#school")) {
    suggestionBox.style.display = "none";
  }
});
</script>

<style>
body {
  font-family: Arial, sans-serif;
  background: #f5f5f5;
  padding: 20px;
}

.container {
  max-width: 600px;
  margin: auto;
  background: white;
  padding: 20px;
  border-radius: 10px;
  box-shadow: 0 0 10px rgba(0,0,0,0.1);
}

h2 {
  text-align: center;
}

label {
  font-weight: bold;
  margin-top: 10px;
  display: block;
}

input[type="text"], select {
  width: 100%;
  padding: 10px;
  margin-top: 5px;
  border-radius: 5px;
  border: 1px solid #ccc;
  box-sizing: border-box;
}

.radio-group {
  margin-top: 10px;
  margin-bottom: 10px;
}

.radio-option {
  display: block;
  margin: 8px 0;
  padding: 8px;
  background: #f9f9f9;
  border-radius: 5px;
}

.radio-option:hover {
  background: #f0f0f0;
}

.radio-option input[type="radio"] {
  margin-right: 8px;
  cursor: pointer;
}

.radio-option label {
  display: inline;
  font-weight: normal;
  cursor: pointer;
  margin: 0;
}

.other-input {
  display: inline-block;
  margin-left: 8px;
  padding: 5px;
  border: 1px solid #ccc;
  border-radius: 3px;
  width: 200px;
}

button {
  margin-top: 20px;
  width: 100%;
  padding: 12px;
  background: #000;
  color: white;
  border: none;
  border-radius: 5px;
  font-size: 16px;
  cursor: pointer;
}

button:hover {
  background: #333;
}

.error {
  color: red;
  font-size: 12px;
  margin-top: 10px;
}

.field-label {
  margin-top: 15px;
  margin-bottom: 5px;
}
  .suggestions-box {
  position: absolute;
  width: 100%;
  background: white;
  border: 1px solid #ccc;
  max-height: 180px;
  overflow-y: auto;
  z-index: 1000;
  border-radius: 5px;
}

.suggestion-item {
  padding: 10px;
  cursor: pointer;
}

.suggestion-item:hover,
.suggestion-item.active {
  background: #f0f0f0;
}
</style>
</head>

<body>

<div class="container">
<form id="studentForm" onsubmit="event.preventDefault(); submitForm();">

<h2>Student Information</h2>

<label class="field-label">氏名 / Full Name *</label>
<input type="text" id="name" placeholder="例: Magar Ram">

<label class="field-label">カタカナ / Katakana *</label>
<input type="text" id="katakana" placeholder="例: マガル　ラム">

<label class="field-label">性別 / Sex *</label>
<select id="sex">
  <option value="">Select</option>
  <option>Male</option>
  <option>Female</option>
</select>

<label class="field-label">国籍（地域） / Nationality (Region) *</label>
<div class="radio-group">
  <div class="radio-option">
    <input type="radio" name="nationality" id="nationality-nepal" value="Nepal" onchange="handleNationalityOther()">
    <label for="nationality-nepal">Nepal</label>
  </div>
  <div class="radio-option">
    <input type="radio" name="nationality" id="nationality-srilanka" value="Sri Lanka" onchange="handleNationalityOther()">
    <label for="nationality-srilanka">Sri Lanka</label>
  </div>
  <div class="radio-option">
    <input type="radio" name="nationality" id="nationality-bangladesh" value="Bangladesh" onchange="handleNationalityOther()">
    <label for="nationality-bangladesh">Bangladesh</label>
  </div>
  <div class="radio-option">
    <input type="radio" name="nationality" id="nationality-vietnam" value="Vietnam" onchange="handleNationalityOther()">
    <label for="nationality-vietnam">Vietnam</label>
  </div>
  <div class="radio-option">
    <input type="radio" name="nationality" id="nationality-myanmar" value="Myanmar" onchange="handleNationalityOther()">
    <label for="nationality-myanmar">Myanmar</label>
  </div>
  <div class="radio-option">
    <input type="radio" name="nationality" id="nationality-uzbekistan" value="Uzbekistan" onchange="handleNationalityOther()">
    <label for="nationality-uzbekistan">Uzbekistan</label>
  </div>
  <div class="radio-option">
    <input type="radio" name="nationality" id="nationality-pakistan" value="Pakistan" onchange="handleNationalityOther()">
    <label for="nationality-pakistan">Pakistan</label>
  </div>
  <div class="radio-option">
    <input type="radio" name="nationality" id="nationality-other" value="" onchange="handleNationalityOther()">
    <label for="nationality-other">Others:</label>
    <input type="text" class="other-input" id="nationality-other-input" placeholder="Please specify" disabled oninput="updateOtherValue()">
  </div>
</div>

<label class="field-label">電話番号 / Phone *</label>
<input type="text" id="phone" placeholder="例: 090-XXXX-XXXX">

<label class="field-label">Email *</label>
<input type="text" id="email" placeholder="例: xxxx@yyy.com">

<label class="field-label">日本の在籍学校 / Current School *</label>
<div style="position:relative;">
  <input type="text" id="school" placeholder="Type school name" autocomplete="off">
  <div id="suggestions" class="suggestions-box"></div>
</div>
  
<label class="field-label">卒業予定年月（例：2027/3） / Expected Graduation Date (Example: 2027/3) *</label>
<select id="graduation">
  <option value="">Select</option>
  <option value="2026/9">(2026年9月) September, 2026</option>
  <option value="2027/3">(2027年3月) March, 2027</option>
  <option value="2027/9">(2027年9月) September, 2027</option>
  <option value="2028/3">(2028年3月) March, 2028</option>
</select>

<label class="field-label">現在の日本語レベル / Current Japanese Proficiency Level *</label>
<div class="radio-group">
  <div class="radio-option">
    <input type="radio" name="japaneseLevel" id="jlpt-n1" value="日本語能力試験（JLPT）N1相当 / Equivalent to the JLPT N1">
    <label for="jlpt-n1">日本語能力試験（JLPT）N1相当 / Equivalent to the JLPT N1</label>
  </div>
  <div class="radio-option">
    <input type="radio" name="japaneseLevel" id="jlpt-n2" value="日本語能力試験（JLPT）N2相当 / Equivalent to the JLPT N2">
    <label for="jlpt-n2">日本語能力試験（JLPT）N2相当 / Equivalent to the JLPT N2</label>
  </div>
  <div class="radio-option">
    <input type="radio" name="japaneseLevel" id="jlpt-n3" value="日本語能力試験（JLPT）N3相当 / Equivalent to the JLPT N3">
    <label for="jlpt-n3">日本語能力試験（JLPT）N3相当 / Equivalent to the JLPT N3</label>
  </div>
  <div class="radio-option">
    <input type="radio" name="japaneseLevel" id="jlpt-n4" value="日本語能力試験（JLPT）N4相当 / Equivalent to the JLPT N4">
    <label for="jlpt-n4">日本語能力試験（JLPT）N4相当 / Equivalent to the JLPT N4</label>
  </div>
  <div class="radio-option">
    <input type="radio" name="japaneseLevel" id="jlpt-n5" value="日本語能力試験（JLPT）N5相当 / Equivalent to the JLPT N5">
    <label for="jlpt-n5">日本語能力試験（JLPT）N5相当 / Equivalent to the JLPT N5</label>
  </div>
</div>

<div id="error" class="error"></div>

<button type="submit">Submit & Download PDF</button>

</form>
</div>

</body>
</html>
