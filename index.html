<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Student Information Form</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="font.js"></script>

<script>
const { jsPDF } = window.jspdf;

// =========================
// 🚀 SUBMIT FUNCTION
// =========================
function submitForm() {
  console.log("Button clicked");

  const data = {
    name: document.getElementById("name").value.trim(),
    katakana: document.getElementById("katakana").value.trim(),
    sex: document.getElementById("sex").value,
    nationality: getRadioValue("nationality"),
    phone: document.getElementById("phone").value.trim(),
    email: document.getElementById("email").value.trim(),
    school: document.getElementById("school").value.trim(),
    graduation: document.getElementById("graduation").value,
    japaneseLevel: getRadioValue("japaneseLevel"),
  };

  // VALIDATION
  for (let key in data) {
    if (!data[key]) {
      showError("Please fill all fields.");
      return;
    }
  }

  if (!/^[0-9\- ]+$/.test(data.phone)) {
    showError("Phone must contain only numbers.");
    return;
  }

  showError("");

  // 👉 DIRECT PDF (no fetch for testing)
  generatePDF(data);
  alert("PDF Downloaded!");
}

// =========================
// 📄 PDF GENERATION
// =========================
function generatePDF(data) {

  const doc = new jsPDF();

  let y = 20;

  function addField(label, value) {
    doc.text(label + ": " + value, 10, y);
    y += 10;
  }

  addField("Name", data.name);
  addField("Katakana", data.katakana);
  addField("Sex", data.sex);
  addField("Nationality", data.nationality);
  addField("Phone", data.phone);
  addField("Email", data.email);
  addField("School", data.school);
  addField("Graduation", data.graduation);
  addField("Japanese Level", data.japaneseLevel);

  doc.save("student_info.pdf");
}

// =========================
// 🔧 HELPERS
// =========================
function getRadioValue(name) {
  const radios = document.getElementsByName(name);
  for (let r of radios) {
    if (r.checked) return r.value;
  }
  return "";
}

function showError(msg) {
  const el = document.getElementById("error");
  if (el) el.innerText = msg;
}

// =========================
// 🌏 OTHER NATIONALITY
// =========================
function handleNationalityOther() {
  const otherRadio = document.getElementById("nationality-other");
  const otherInput = document.getElementById("nationality-other-input");

  if (otherRadio && otherInput) {
    if (otherRadio.checked) {
      otherInput.disabled = false;
    } else {
      otherInput.disabled = true;
      otherInput.value = "";
    }
  }
}

function updateOtherValue() {
  const otherRadio = document.getElementById("nationality-other");
  const otherInput = document.getElementById("nationality-other-input");

  if (otherRadio && otherInput && otherRadio.checked) {
    otherRadio.value = otherInput.value;
  }
}
</script>

<style>
body {
  font-family: Arial;
  background: #f5f5f5;
  padding: 20px;
}

.container {
  max-width: 600px;
  margin: auto;
  background: white;
  padding: 20px;
  border-radius: 10px;
}

input, select {
  width: 100%;
  padding: 10px;
  margin-top: 5px;
}

button {
  margin-top: 20px;
  width: 100%;
  padding: 12px;
  background: black;
  color: white;
}

.error {
  color: red;
}
</style>
</head>

<body>

<div class="container">
<h2>Student Information</h2>

<form id="myForm" onsubmit="event.preventDefault(); submitForm();">

<label>Name</label>
<input type="text" id="name">

<label>Katakana</label>
<input type="text" id="katakana">

<label>Sex</label>
<select id="sex">
<option value="">Select</option>
<option>Male</option>
<option>Female</option>
</select>

<label>Nationality</label>

<input type="radio" name="nationality" value="Nepal"> Nepal<br>
<input type="radio" name="nationality" value="Sri Lanka"> Sri Lanka<br>
<input type="radio" name="nationality" value="Other" id="nationality-other" onchange="handleNationalityOther()"> Other
<input type="text" id="nationality-other-input" disabled onchange="updateOtherValue()">

<label>Phone</label>
<input type="text" id="phone">

<label>Email</label>
<input type="text" id="email">

<label>School</label>
<input type="text" id="school">

<label>Graduation</label>
<select id="graduation">
<option value="">Select</option>
<option>2026/9</option>
<option>2027/3</option>
</select>

<label>Japanese Level</label>
<input type="radio" name="japaneseLevel" value="N1"> N1
<input type="radio" name="japaneseLevel" value="N2"> N2

<div id="error" class="error"></div>

<button type="submit">Submit & Download PDF</button>

</form>
</div>

</body>
</html>
