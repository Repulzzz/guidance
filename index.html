<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>学生情報登録フォーム | Student Registration</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <title>学生情報登録フォーム</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      font-family: 'Inter', system-ui, -apple-system, sans-serif;
      font-family: Arial, sans-serif;
      padding: 20px;
      min-height: 100vh;
    }

    .container {
      max-width: 750px;
      max-width: 700px;
      margin: 0 auto;
      background: white;
      border-radius: 28px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.3);
      overflow: hidden;
      animation: fadeIn 0.5s ease;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .header {
      background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%);
      color: white;
      padding: 30px;
      text-align: center;
    }

    .header h1 {
      font-size: 1.8rem;
      margin-bottom: 8px;
    }

    .header p {
      opacity: 0.9;
      font-size: 0.9rem;
    }

    form {
      border-radius: 20px;
      padding: 30px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.3);
    }

    .form-group {
      margin-bottom: 22px;
    }

    label {
      display: block;
      font-weight: 600;
      margin-bottom: 8px;
      color: #2d3748;
      font-size: 0.85rem;
    }

    .required {
      color: #e53e3e;
      margin-left: 4px;
    }

    h1 { text-align: center; margin-bottom: 20px; color: #333; }
    .form-group { margin-bottom: 15px; }
    label { display: block; font-weight: bold; margin-bottom: 5px; color: #555; }
    .required { color: red; }
    input, select {
      width: 100%;
      padding: 12px 16px;
      border: 2px solid #e2e8f0;
      border-radius: 12px;
      font-size: 0.95rem;
      transition: all 0.3s;
      font-family: inherit;
    }

    input:focus, select:focus {
      outline: none;
      border-color: #667eea;
      box-shadow: 0 0 0 3px rgba(102,126,234,0.1);
    }

    .radio-group {
      background: #f7fafc;
      border-radius: 12px;
      padding: 12px;
    }

    .radio-option {
      display: flex;
      align-items: center;
      padding: 10px;
      margin: 5px 0;
      background: white;
      border: 1px solid #ddd;
      border-radius: 8px;
      cursor: pointer;
      transition: all 0.2s;
    }

    .radio-option:hover {
      background: #edf2f7;
    }

    .radio-option input[type="radio"] {
      width: auto;
      margin-right: 12px;
      cursor: pointer;
    }

    .radio-option label {
      margin: 0;
      cursor: pointer;
      font-weight: normal;
    }

    .other-input {
      margin-left: 12px;
      flex: 1;
      font-size: 14px;
    }

    .radio-group { background: #f5f5f5; padding: 10px; border-radius: 8px; }
    .radio-option { margin: 8px 0; display: flex; align-items: center; }
    .radio-option input { width: auto; margin-right: 10px; }
    .radio-option label { margin: 0; font-weight: normal; }
    .other-input { margin-left: 10px; flex: 1; }
    button {
      width: 100%;
      padding: 14px;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      padding: 12px;
      background: #4CAF50;
      color: white;
      border: none;
      border-radius: 12px;
      font-size: 1rem;
      font-weight: 600;
      border-radius: 8px;
      font-size: 16px;
      cursor: pointer;
      transition: transform 0.2s, box-shadow 0.2s;
      margin-top: 10px;
    }

    button:hover {
      transform: translateY(-2px);
      box-shadow: 0 10px 25px rgba(102,126,234,0.4);
    }

    button:active {
      transform: translateY(0);
    }

    button:disabled {
      opacity: 0.6;
      cursor: not-allowed;
    }

    .error {
      background: #fed7d7;
      color: #c53030;
      padding: 12px;
      border-radius: 10px;
      margin-top: 15px;
      font-size: 0.85rem;
      text-align: center;
      display: none;
      margin-top: 20px;
    }

    .success {
      background: #c6f6d5;
      color: #22543d;
      padding: 12px;
      border-radius: 10px;
    button:hover { background: #45a049; }
    button:disabled { opacity: 0.6; cursor: not-allowed; }
    .error, .success {
      padding: 10px;
      border-radius: 8px;
      margin-top: 15px;
      font-size: 0.85rem;
      text-align: center;
      display: none;
    }

    @media (max-width: 600px) {
      form { padding: 20px; }
      .header h1 { font-size: 1.4rem; }
    }
    .error { background: #ffebee; color: #c62828; }
    .success { background: #e8f5e9; color: #2e7d32; }
  </style>
</head>
<body>
<div class="container">
  <div class="header">
    <h1>📝 学生情報登録フォーム</h1>
    <p>Student Information Registration Form</p>
  </div>
  <h1>📝 学生情報登録フォーム</h1>

  <form id="studentForm">
    <div class="form-group">
      <label>氏名 / Full Name <span class="required">*</span></label>
      <input type="text" id="name" placeholder="例: Suzuki Ichiro / 鈴木 一郎">
      <input type="text" id="name" placeholder="例: Suzuki Ichiro">
    </div>

    <div class="form-group">
      <label>カタカナ / Katakana <span class="required">*</span></label>
      <input type="text" id="katakana" placeholder="例: スズキ イチロウ">
    </div>

    <div class="form-group">
      <label>性別 / Sex <span class="required">*</span></label>
      <select id="sex">
        <option value="">選択してください</option>
        <option value="Male">男性 / Male</option>
        <option value="Female">女性 / Female</option>
      </select>
    </div>

    <div class="form-group">
      <label>国籍 / Nationality <span class="required">*</span></label>
      <div class="radio-group" id="nationalityGroup">
        <div class="radio-option">
          <input type="radio" name="nationality" value="Nepal" id="natNepal">
          <label for="natNepal">ネパール / Nepal</label>
        </div>
        <div class="radio-option">
          <input type="radio" name="nationality" value="Sri Lanka" id="natSri">
          <label for="natSri">スリランカ / Sri Lanka</label>
        </div>
        <div class="radio-option">
          <input type="radio" name="nationality" value="Bangladesh" id="natBang">
          <label for="natBang">バングラデシュ / Bangladesh</label>
        </div>
        <div class="radio-option">
          <input type="radio" name="nationality" value="Vietnam" id="natViet">
          <label for="natViet">ベトナム / Vietnam</label>
        </div>
        <div class="radio-option">
          <input type="radio" name="nationality" value="Myanmar" id="natMyan">
          <label for="natMyan">ミャンマー / Myanmar</label>
        </div>
        <div class="radio-option">
          <input type="radio" name="nationality" value="Uzbekistan" id="natUzb">
          <label for="natUzb">ウズベキスタン / Uzbekistan</label>
        </div>
        <div class="radio-option">
          <input type="radio" name="nationality" value="Pakistan" id="natPak">
          <label for="natPak">パキスタン / Pakistan</label>
        </div>
        <div class="radio-option">
          <input type="radio" name="nationality" value="" id="natOther">
          <label for="natOther">その他 / Other:</label>
          <input type="text" id="otherNationality" class="other-input" placeholder="国名を入力" disabled>
        </div>
      <div class="radio-group">
        <div class="radio-option"><input type="radio" name="nationality" value="Nepal"> <label>Nepal</label></div>
        <div class="radio-option"><input type="radio" name="nationality" value="Sri Lanka"> <label>Sri Lanka</label></div>
        <div class="radio-option"><input type="radio" name="nationality" value="Bangladesh"> <label>Bangladesh</label></div>
        <div class="radio-option"><input type="radio" name="nationality" value="Vietnam"> <label>Vietnam</label></div>
        <div class="radio-option"><input type="radio" name="nationality" value="Myanmar"> <label>Myanmar</label></div>
        <div class="radio-option"><input type="radio" name="nationality" value="Uzbekistan"> <label>Uzbekistan</label></div>
        <div class="radio-option"><input type="radio" name="nationality" value="Pakistan"> <label>Pakistan</label></div>
        <div class="radio-option"><input type="radio" name="nationality" value="" id="natOther"> <label>Other:</label> <input type="text" id="otherNationality" class="other-input" placeholder="Enter country" disabled></div>
      </div>
    </div>

    <div class="form-group">
      <label>電話番号 / Phone <span class="required">*</span></label>
      <input type="tel" id="phone" placeholder="例: 090-1234-5678">
      <input type="tel" id="phone" placeholder="090-1234-5678">
    </div>

    <div class="form-group">
      <label>Email <span class="required">*</span></label>
      <input type="email" id="email" placeholder="example@email.com">
    </div>

    <div class="form-group">
      <label>在籍学校 / Current School <span class="required">*</span></label>
      <input list="schools" id="school" placeholder="学校名を入力">
      <datalist id="schools">
        <option>Human Academy Japanese Language School Osaka Campus</option>
        <option>ISI Language School Osaka</option>
        <option>Kyoto Institute of Language and Culture</option>
        <option>Osaka Christian Junior College Japanese Course</option>
      </datalist>
      <input type="text" id="school" placeholder="学校名を入力">
    </div>

    <div class="form-group">
      <label>卒業予定 / Expected Graduation <span class="required">*</span></label>
      <select id="graduation">
        <option value="">選択してください</option>
        <option value="2026/9">2026年9月 / September 2026</option>
        <option value="2027/3">2027年3月 / March 2027</option>
        <option value="2027/9">2027年9月 / September 2027</option>
        <option value="2028/3">2028年3月 / March 2028</option>
        <option value="2026/9">2026年9月</option>
        <option value="2027/3">2027年3月</option>
        <option value="2027/9">2027年9月</option>
        <option value="2028/3">2028年3月</option>
      </select>
    </div>

    <div class="form-group">
      <label>日本語レベル / Japanese Level <span class="required">*</span></label>
      <div class="radio-group">
        <div class="radio-option">
          <input type="radio" name="jpLevel" value="JLPT N1 相当">
          <label>JLPT N1 相当</label>
        </div>
        <div class="radio-option">
          <input type="radio" name="jpLevel" value="JLPT N2 相当">
          <label>JLPT N2 相当</label>
        </div>
        <div class="radio-option">
          <input type="radio" name="jpLevel" value="JLPT N3 相当">
          <label>JLPT N3 相当</label>
        </div>
        <div class="radio-option">
          <input type="radio" name="jpLevel" value="JLPT N4 相当">
          <label>JLPT N4 相当</label>
        </div>
        <div class="radio-option">
          <input type="radio" name="jpLevel" value="JLPT N5 相当">
          <label>JLPT N5 相当</label>
        </div>
        <div class="radio-option"><input type="radio" name="jpLevel" value="JLPT N1"> <label>JLPT N1</label></div>
        <div class="radio-option"><input type="radio" name="jpLevel" value="JLPT N2"> <label>JLPT N2</label></div>
        <div class="radio-option"><input type="radio" name="jpLevel" value="JLPT N3"> <label>JLPT N3</label></div>
        <div class="radio-option"><input type="radio" name="jpLevel" value="JLPT N4"> <label>JLPT N4</label></div>
        <div class="radio-option"><input type="radio" name="jpLevel" value="JLPT N5"> <label>JLPT N5</label></div>
      </div>
    </div>

    <div id="errorMsg" class="error"></div>
    <div id="successMsg" class="success"></div>
    
    <button type="button" id="submitBtn">✅ 送信してPDFをダウンロード</button>
  </form>
</div>

<script>
// 🔴 IMPORTANT: REPLACE THIS WITH YOUR ACTUAL DEPLOYED URL FROM STEP 1
// Example: "https://script.google.com/macros/s/AKfycbw5XyZ123456789/exec"

const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbz7NzOjuyNtlOuPd8hDELhi_iD0YY0l3pvyu8kX7BDpRfaNXjn8Lg6mQd-8CRAerlDSDg/exec";

// Nationality handling
// Handle other nationality
const otherRadio = document.getElementById('natOther');
const otherInput = document.getElementById('otherNationality');

function handleOtherNationality() {
function handleOther() {
  if (otherRadio.checked) {
    otherInput.disabled = false;
    otherInput.required = true;
  } else {
    otherInput.disabled = true;
    otherInput.required = false;
    otherInput.value = '';
  }
}

otherRadio.addEventListener('change', handleOtherNationality);
document.querySelectorAll('input[name="nationality"]').forEach(radio => {
  radio.addEventListener('change', handleOtherNationality);
});
if (otherRadio) otherRadio.addEventListener('change', handleOther);
document.querySelectorAll('input[name="nationality"]').forEach(r => r.addEventListener('change', handleOther));

function getNationality() {
  const selected = document.querySelector('input[name="nationality"]:checked');
  if (!selected) return '';
  if (selected.value === '' && otherInput.value) {
    return otherInput.value;
  }
  if (selected.value === '' && otherInput.value) return otherInput.value;
  return selected.value;
}

function getJapaneseLevel() {
  const selected = document.querySelector('input[name="jpLevel"]:checked');
  return selected ? selected.value : '';
}

function showError(msg) {
  const errorDiv = document.getElementById('errorMsg');
  errorDiv.textContent = msg;
  errorDiv.style.display = 'block';
  setTimeout(() => {
    errorDiv.style.display = 'none';
  }, 4000);
  const div = document.getElementById('errorMsg');
  div.textContent = msg;
  div.style.display = 'block';
  setTimeout(() => div.style.display = 'none', 4000);
}

function showSuccess(msg) {
  const successDiv = document.getElementById('successMsg');
  successDiv.textContent = msg;
  successDiv.style.display = 'block';
  setTimeout(() => {
    successDiv.style.display = 'none';
  }, 3000);
  const div = document.getElementById('successMsg');
  div.textContent = msg;
  div.style.display = 'block';
  setTimeout(() => div.style.display = 'none', 3000);
}

function validateForm() {
function validate() {
  const name = document.getElementById('name').value.trim();
  const katakana = document.getElementById('katakana').value.trim();
  const sex = document.getElementById('sex').value;
  const nationality = getNationality();
  const phone = document.getElementById('phone').value.trim();
  const email = document.getElementById('email').value.trim();
  const school = document.getElementById('school').value.trim();
  const graduation = document.getElementById('graduation').value;
  const jpLevel = getJapaneseLevel();

  if (!name) { showError('氏名を入力してください'); return false; }
  if (!katakana) { showError('カタカナを入力してください'); return false; }
  if (!sex) { showError('性別を選択してください'); return false; }
  if (!nationality) { showError('国籍を選択または入力してください'); return false; }
  if (!nationality) { showError('国籍を選択してください'); return false; }
  if (!phone) { showError('電話番号を入力してください'); return false; }
  if (!email) { showError('メールアドレスを入力してください'); return false; }
  if (!email.includes('@') || !email.includes('.')) { showError('有効なメールアドレスを入力してください'); return false; }
  if (!email || !email.includes('@')) { showError('有効なメールアドレスを入力してください'); return false; }
  if (!school) { showError('学校名を入力してください'); return false; }
  if (!graduation) { showError('卒業予定を選択してください'); return false; }
  if (!jpLevel) { showError('日本語レベルを選択してください'); return false; }

  return true;
}

function generatePDF(data) {
  const { jsPDF } = window.jspdf;
  const doc = new jsPDF();

  // Header
  doc.setFillColor(30, 60, 120);
  doc.rect(0, 0, 210, 30, 'F');
  doc.setTextColor(255, 255, 255);
  doc.setFontSize(18);
  doc.text('Student Registration Information', 105, 20, { align: 'center' });
  doc.text('Student Registration', 105, 20, { align: 'center' });

  doc.setTextColor(0, 0, 0);
  let y = 45;

  const fields = [
    { label: '氏名 / Full Name:', value: data.name },
    { label: 'カタカナ / Katakana:', value: data.katakana },
    { label: '性別 / Sex:', value: data.sex },
    { label: '国籍 / Nationality:', value: data.nationality },
    { label: '電話番号 / Phone:', value: data.phone },
    { label: 'Email:', value: data.email },
    { label: '学校 / School:', value: data.school },
    { label: '卒業予定 / Graduation:', value: data.graduation },
    { label: '日本語レベル / Japanese Level:', value: data.japaneseLevel }
    ['Name:', data.name], ['Katakana:', data.katakana], ['Sex:', data.sex],
    ['Nationality:', data.nationality], ['Phone:', data.phone], ['Email:', data.email],
    ['School:', data.school], ['Graduation:', data.graduation], ['Japanese Level:', data.japaneseLevel]
  ];

  doc.setFontSize(11);
  fields.forEach(field => {
    if (field.value) {
      doc.setTextColor(80, 80, 120);
      doc.text(field.label, 20, y);
      doc.setTextColor(0, 0, 0);
      doc.text(field.value, 70, y);
    if (field[1]) {
      doc.text(field[0], 20, y);
      doc.text(field[1], 70, y);
      y += 10;
      doc.setDrawColor(220, 220, 220);
      doc.line(20, y - 3, 190, y - 3);
    }
  });

  const date = new Date().toLocaleDateString('ja-JP');
  doc.setFontSize(9);
  doc.setTextColor(128, 128, 128);
  doc.text(`Generated: ${date}`, 150, 280);
  
  doc.save('student_registration.pdf');
}

async function submitToGoogleSheets(data) {
  const params = new URLSearchParams();
  params.append('name', data.name);
  params.append('katakana', data.katakana);
  params.append('sex', data.sex);
  params.append('nationality', data.nationality);
  params.append('phone', data.phone);
  params.append('email', data.email);
  params.append('school', data.school);
  params.append('graduation', data.graduation);
  params.append('japaneseLevel', data.japaneseLevel);
  
async function sendToSheet(data) {
  try {
    console.log("Sending to:", SCRIPT_URL);
    
    // Use fetch with proper CORS handling
    const response = await fetch(SCRIPT_URL, {
      method: 'POST',
      mode: 'no-cors', // This bypasses CORS for the request
      mode: 'no-cors',
      headers: {
        'Content-Type': 'application/x-www-form-urlencoded',
        'Content-Type': 'application/json',
      },
      body: params.toString()
      body: JSON.stringify(data)
    });
    
    console.log("Request sent successfully (no-cors mode)");
    console.log('Request sent successfully');
    return true;
  } catch (error) {
    console.error("Fetch error:", error);
  } catch(err) {
    console.error('Error:', err);
    return false;
  }
}

document.getElementById('submitBtn').addEventListener('click', async function() {
  if (!validateForm()) return;
  if (!validate()) return;

  const btn = this;
  const originalText = btn.textContent;
  btn.textContent = '⏳ 送信中...';
  btn.disabled = true;

  const formData = {
    name: document.getElementById('name').value.trim(),
    katakana: document.getElementById('katakana').value.trim(),
    sex: document.getElementById('sex').value,
    nationality: getNationality(),
    phone: document.getElementById('phone').value.trim(),
    email: document.getElementById('email').value.trim(),
    school: document.getElementById('school').value.trim(),
    graduation: document.getElementById('graduation').value,
    japaneseLevel: getJapaneseLevel()
  };

  // Generate PDF
  generatePDF(formData);
  await sendToSheet(formData);

  // Send to Google Sheets
  const success = await submitToGoogleSheets(formData);
  
  if (success) {
    showSuccess('✅ データが送信されました！PDFもダウンロードされています。');
  } else {
    showError('⚠️ 送信に失敗しましたが、PDFはダウンロードされています。');
  }
  
  btn.textContent = originalText;
  btn.disabled = false;
  
  // Optional: Reset form
  // document.getElementById('studentForm').reset();
  showSuccess('✅ データが送信されました！PDFもダウンロードされました。');
  btn.textContent = '✅ 送信完了';
  setTimeout(() => {
    btn.textContent = '✅ 送信してPDFをダウンロード';
    btn.disabled = false;
  }, 2000);
});
</script>
</body>
</html>
