<script>
function submitForm() {
  const data = {
    name: document.getElementById("name").value.trim(),
    katakana: document.getElementById("katakana").value.trim(),
    sex: document.getElementById("sex").value,
    nationality: getRadioValue("nationality"),
    phone: document.getElementById("phone").value.trim(),
    email: document.getElementById("email")?.value.trim() || "",
    school: document.getElementById("school").value.trim(),
    graduation: document.getElementById("graduation").value,
    japaneseLevel: getRadioValue("japaneseLevel"),
    key: "kcg123"
  };

  // ✅ Validation
  for (let key in data) {
    if (key === "email" || key === "key") continue;
    if (!data[key]) {
      showError("Please fill all fields.");
      return;
    }
  }

  if (!/^[0-9\-]+$/.test(data.phone)) {
    showError("Phone must contain only numbers and hyphens.");
    return;
  }

  if (data.email && !/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(data.email)) {
    showError("Invalid email format.");
    return;
  }

  showError("");

  fetch("https://script.google.com/macros/s/AKfycbz7NzOjuyNtlOuPd8hDELhi_iD0YY0l3pvyu8kX7BDpRfaNXjn8Lg6mQd-8CRAerlDSDg/exec", {
    method: "POST",
    body: JSON.stringify(data)
  })
  .then(res => res.json())
  .then(() => {
    // ✅ AFTER SUCCESS → generate PDF
    generatePDF(data);
    alert("Submitted successfully!");
    document.getElementById("studentForm")?.reset();
  })
  .catch(err => {
    showError("Submission failed. Please try again.");
    console.log(err);
  });
}

// 📄 PDF GENERATION using html2canvas
function generatePDF(data) {
  const element = document.createElement("div");
  element.style.padding = "30px";
  element.style.fontFamily = "Arial";
  element.style.width = "800px";
  element.style.background = "white";

  element.innerHTML = `
    <h2 style="text-align:center; border-bottom:2px solid black; padding-bottom:10px;">
      Student Information Form
    </h2>

    <table style="width:100%; border-collapse:collapse; margin-top:20px;">
      ${row("氏名 / Name", data.name)}
      ${row("カタカナ / Katakana", data.katakana)}
      ${row("性別 / Sex", data.sex)}
      ${row("国籍 / Nationality", data.nationality)}
      ${row("電話番号 / Phone", data.phone)}
      ${row("Email", data.email)}
      ${row("学校 / School", data.school)}
      ${row("卒業予定 / Graduation", data.graduation)}
      ${row("日本語レベル / Japanese Level", data.japaneseLevel)}
    </table>

    <p style="margin-top:30px; text-align:right;">
      Date: ${new Date().toLocaleDateString()}
    </p>
  `;

  document.body.appendChild(element);

  html2canvas(element, { scale: 2 }).then(canvas => {
    const imgData = canvas.toDataURL("image/png");
    const { jsPDF } = window.jspdf;
    const doc = new jsPDF("p", "mm", "a4");

    const imgWidth = 210;
    const imgHeight = canvas.height * imgWidth / canvas.width;

    doc.addImage(imgData, "PNG", 0, 0, imgWidth, imgHeight);
    doc.save(`student_${data.name.replace(/\s/g, '_')}.pdf`);

    document.body.removeChild(element);
  });
}

// Helper for table rows
function row(label, value) {
  return `
    <tr>
      <td style="border:1px solid black; padding:10px; width:35%;">
        <b>${label}</b>
      </td>
      <td style="border:1px solid black; padding:10px;">
        ${value || ""}
      </td>
    </tr>
  `;
}

// 🔧 Helpers
function getRadioValue(name) {
  const radios = document.getElementsByName(name);
  for (let radio of radios) {
    if (radio.checked) return radio.value;
  }
  return "";
}

function showError(msg) {
  document.getElementById("error").innerText = msg;
}

// Nationality "Other" handling
function handleNationalityOther() {
  const otherRadio = document.getElementById("nationality-other");
  const otherInput = document.getElementById("nationality-other-input");

  if (otherRadio.checked) {
    otherInput.disabled = false;
    otherInput.focus();
  } else {
    otherInput.disabled = true;
    otherInput.value = "";
  }
}

function updateOtherValue() {
  const otherRadio = document.getElementById("nationality-other");
  const otherInput = document.getElementById("nationality-other-input");

  if (otherInput.value.trim()) {
    otherRadio.value = otherInput.value.trim();
  } else {
    otherRadio.value = "";
  }
}

document.addEventListener("DOMContentLoaded", function () {

  const input = document.getElementById("school");
  const box = document.getElementById("suggestions");

  let currentIndex = -1;

  input.addEventListener("input", function () {
    const value = this.value.toLowerCase();
    box.innerHTML = "";
    currentIndex = -1;

    if (!value) {
      box.style.display = "none";
      return;
    }

    const filtered = schools.filter(s =>
      s.toLowerCase().includes(value)
    );

    filtered.slice(0, 10).forEach((item, index) => {
      const div = document.createElement("div");
      div.className = "suggestion-item";

      // Highlight match
      const regex = new RegExp(`(${value})`, "gi");
      div.innerHTML = item.replace(regex, "<b>$1</b>");

      div.addEventListener("click", () => {
        input.value = item;
        box.style.display = "none";
      });

      box.appendChild(div);
    });

    box.style.display = "block";
  });

  // ✅ KEYBOARD SUPPORT (LIKE GOOGLE)
  input.addEventListener("keydown", function (e) {
    const items = box.querySelectorAll(".suggestion-item");

    if (!items.length) return;

    if (e.key === "ArrowDown") {
      currentIndex++;
      if (currentIndex >= items.length) currentIndex = 0;
      setActive(items);
    }

    else if (e.key === "ArrowUp") {
      currentIndex--;
      if (currentIndex < 0) currentIndex = items.length - 1;
      setActive(items);
    }

    else if (e.key === "Enter") {
      e.preventDefault();
      if (currentIndex > -1) {
        items[currentIndex].click();
      }
    }
  });

  function setActive(items) {
    items.forEach(item => item.classList.remove("active"));
    if (currentIndex >= 0) {
      items[currentIndex].classList.add("active");
      items[currentIndex].scrollIntoView({ block: "nearest" });
    }
  }

  // Hide when clicking outside
  document.addEventListener("click", e => {
    if (!e.target.closest("#school")) {
      box.style.display = "none";
    }
  });

});
</script>
