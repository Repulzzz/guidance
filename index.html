const { jsPDF } = window.jspdf;

// =========================
// 🚀 MAIN SUBMIT FUNCTION
// =========================
function submitForm() {

  const data = {
    name: document.getElementById("name").value.trim(),
    katakana: document.getElementById("katakana").value.trim(),
    sex: document.getElementById("sex").value,
    nationality: getRadioValue("nationality"),
    phone: document.getElementById("phone").value.trim(),
    email: document.getElementById("email")?.value.trim() || "",
    school: document.getElementById("school").value.trim(),
    graduation: document.getElementById("graduation").value,
    japaneseLevel: getRadioValue("japaneseLevel"),
  };

  // ✅ VALIDATION
  for (let key in data) {
    if (key === "email") continue;
    if (!data[key]) {
      showError("Please fill all fields.");
      return;
    }
  }

  if (!/^[0-9]+$/.test(data.phone)) {
    showError("Phone must contain only numbers.");
    return;
  }

  showError("");

  generatePDF(data);

  setTimeout(() => {
    window.location.href = "thankyou.html";
  }, 500);
}

// =========================
// 📄 PDF GENERATION
// =========================
function generatePDF(data) {

  const doc = new jsPDF();

  // ✅ FONT (ONLY NORMAL — STABLE)
  try {
    doc.addFileToVFS("NotoSansJP-Regular.ttf", notoSansJPBase64);
    doc.addFont("NotoSansJP-Regular.ttf", "NotoSansJP", "normal");

    doc.setFont("NotoSansJP", "normal");
    doc.setCharSpace(0);
  } catch (e) {
    console.log("Font failed");
  }

  // =========================
  // 🎨 HEADER
  // =========================
  doc.setFillColor(30, 60, 120);
  doc.rect(0, 0, 210, 25, "F");

  doc.setTextColor(255, 255, 255);
  doc.setFontSize(18);
  doc.text("Thank you for Filling", 105, 15, { align: "center" });

  doc.setTextColor(0, 0, 0);

  let y = 35;

  // =========================
  // 🧾 FIELD FUNCTION
  // =========================
  function addField(label, value) {
    if (!value) return;

    const textToLineGap = 8;
    const fieldGap = 12;

    // Label (blue, normal — no bold to avoid bug)
    doc.setFont("NotoSansJP", "normal");
    doc.setFontSize(12);
    doc.setTextColor(30, 60, 120);
    doc.text(label, 15, y);

    // Value
    doc.setTextColor(0);
    const lines = doc.splitTextToSize(value, 110);
    doc.text(lines, 80, y);

    // Line
    doc.setDrawColor(200);
    doc.line(15, y + textToLineGap, 200, y + textToLineGap);

    y += lines.length * 6 + fieldGap;
  }

  // =========================
  // 📋 CONTENT
  // =========================
  addField("Name / 氏名", data.name);
  addField("Katakana / カタカナ", data.katakana);
  addField("Sex / 性別", data.sex);
  addField("Nationality / 国籍", data.nationality);
  addField("Phone / 電話番号", data.phone);
  addField("Email / メール", data.email);
  addField("School / 日本の在籍学校", data.school);
  addField("Graduation / 卒業予定", data.graduation);
  addField("Japanese Level / 日本語レベル", data.japaneseLevel);

  // =========================
  // 📅 FOOTER
  // =========================
  const today = new Date().toLocaleDateString();

  doc.setFontSize(9);
  doc.setTextColor(120);
  doc.text("Date: " + today, 150, 285);

  doc.setDrawColor(30, 60, 120);
  doc.line(10, 280, 200, 280);

  // =========================
  // 💾 SAVE
  // =========================
  doc.save("student_resume.pdf");
}

// =========================
// 🔧 HELPERS
// =========================
function getRadioValue(name) {
  const radios = document.getElementsByName(name);
  for (let radio of radios) {
    if (radio.checked) return radio.value;
  }
  return "";
}

function showError(msg) {
  document.getElementById("error").innerText = msg;
}
